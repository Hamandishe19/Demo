<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | KensitonDrive</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#E63946',
                        dark: '#111827',
                        darker: '#030712',
                        light: '#F3F4F6',
                        bordercolor: '#1f2937'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Outfit', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Admin CSS -->
    <link rel="stylesheet" href="css/admin-style.css">
</head>

<body
    class="bg-darker text-light font-sans antialiased min-h-screen flex items-center justify-center relative overflow-hidden">

    <!-- Background Elements -->
    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-primary/20 rounded-full blur-[100px]"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[500px] h-[500px] bg-red-900/20 rounded-full blur-[120px]"></div>

    <div class="w-full max-w-md px-6 animate-fade-in relative z-10">
        <!-- Logo -->
        <div class="text-center mb-10">
            <div
                class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-dark border border-gray-800 shadow-xl mb-4">
                <i class="fa-solid fa-shield-halved text-2xl text-primary mt-1"></i>
            </div>
            <h1 class="font-heading text-3xl font-bold text-white tracking-tight">KensitonDrive Admin</h1>
            <p class="text-gray-400 mt-2 text-sm">Authorized Personnel Only</p>
        </div>

        <!-- Login Form -->
        <div class="glass-panel p-8 rounded-2xl">
            <!-- Alert Box (Hidden) -->
            <div id="login-error"
                class="hidden mb-6 bg-red-500/10 border border-red-500/50 text-red-500 px-4 py-3 rounded-xl text-sm font-medium flex items-center gap-3">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <span>Invalid credentials.</span>
            </div>

            <form onsubmit="handleAdminLogin(event)" class="space-y-6">
                <!-- Email -->
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-300 mb-2">Staff Email</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-regular fa-envelope text-gray-500"></i>
                        </div>
                        <input type="email" id="email" name="email" required
                            class="block w-full pl-11 pr-4 py-3.5 bg-dark border border-gray-700 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
                            placeholder="admin@Kensitondrive.com">
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-300 mb-2">Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-solid fa-lock text-gray-500"></i>
                        </div>
                        <input type="password" id="password" name="password" required
                            class="block w-full pl-11 pr-4 py-3.5 bg-dark border border-gray-700 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
                            placeholder="••••••••">
                    </div>
                </div>

                <!-- Demo Credentials Helper -->
                <div class="text-xs text-gray-500 p-3 bg-dark/50 rounded-lg border border-gray-800">
                    <span class="block mb-1 text-gray-400 font-medium">Demo Access:</span>
                    <div class="grid grid-cols-2 gap-2 mt-2">
                        <div>
                            <span class="block text-white opacity-80">super@Kensitondrive.com</span>
                            <span class="block">Pass: admin123</span>
                        </div>
                        <div>
                            <span class="block text-white opacity-80">admin@Kensitondrive.com</span>
                            <span class="block">Pass: admin123</span>
                        </div>
                    </div>
                </div>

                <button type="submit"
                    class="w-full flex items-center justify-center py-3.5 px-4 border border-transparent rounded-xl shadow-lg shadow-primary/20 text-sm font-bold text-white bg-primary hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary focus:ring-offset-dark transition-all">
                    <span id="btn-text">Authenticate Securely</span>
                    <i id="btn-spinner" class="fa-solid fa-circle-notch fa-spin hidden"></i>
                </button>
            </form>

            <div class="mt-8 text-center border-t border-gray-800 pt-6">
                <a href="../index.html" class="text-sm font-medium text-gray-400 hover:text-white transition-colors">
                    <i class="fa-solid fa-arrow-left mr-2"></i> Return to Main Website
                </a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/admin-auth.js"></script>
</body>

</html>
